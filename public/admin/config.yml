# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
backend:
  name: github
  repo: fx-jam/fx.jam
  branch: main
  base_url: https://sveltia-cms-auth.felix-jambon20.workers.dev
  # En local : utiliser le bouton "Work with Local Repository" (aucune auth requise)

media_folder: "public/images"
public_folder: "/images"

locale: fr

collections:
  - name: gigs
    label: Dates / gigs
    label_singular: Gig
    description: Concerts, sets DJ, lives — passés et à venir
    folder: "src/content/gigs"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{date | date('DD/MM/YYYY')}} — {{title}} ({{venue}})"
    fields:
      - { label: "Titre / événement", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - label: "Format"
        name: "format"
        widget: "select"
        options:
          - { label: "DJ set", value: "dj" }
          - { label: "Live", value: "live" }
          - { label: "Hybride (DJ + Live)", value: "hybride" }
        default: "dj"
      - { label: "Rôle / précision", name: "role", widget: "string", required: false, hint: "Ex: 'Warm-up', 'B2B avec X', 'Live Sylphyo'" }
      - { label: "Lieu / festival", name: "venue", widget: "string" }
      - { label: "Ville", name: "city", widget: "string", required: false }
      - { label: "Pays", name: "country", widget: "string", default: "France" }
      - { label: "Genres", name: "genre", widget: "list", required: false, hint: "Ex: psytrance, hi-tech, goa" }
      - { label: "Durée", name: "duration", widget: "string", required: false, hint: "Ex: 2h, 1h30" }
      - { label: "Line-up (autres artistes)", name: "lineup", widget: "list", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Enregistrement (URL)", name: "recording", widget: "string", required: false, hint: "SoundCloud, Mixcloud..." }
      - { label: "Lien événement (URL)", name: "eventUrl", widget: "string", required: false }
      - { label: "Mettre en avant", name: "featured", widget: "boolean", default: false }
      - { label: "Brouillon (caché du site)", name: "draft", widget: "boolean", default: false }
      - { label: "Notes privées", name: "notes", widget: "text", required: false, hint: "Pour toi, ne s'affiche pas forcément sur le site" }
      - { label: "Description publique (optionnelle)", name: "body", widget: "markdown", required: false }

  - name: blog
    label: Articles de blog
    label_singular: Article
    description: Articles techniques (production, son live, psytrance)
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Date de publication", name: "pubDate", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Brouillon", name: "draft", widget: "boolean", default: false }
      - { label: "Contenu", name: "body", widget: "markdown" }

  - name: donnees-site
    label: "Données du site"
    files:
      - name: profil
        label: "Profil & liens globaux"
        file: src/data/site.json
        format: json
        fields:
          - { label: "Nom affiché", name: displayName, widget: string }
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "Bio courte", name: bio, widget: text, required: false }
          - { label: "Ville", name: location, widget: string, required: false }
          - { label: "Logo (URL)", name: logo_url, widget: string, required: false, hint: "URL d'une image PNG/SVG pour le centre du jog (44×44 SVG units)" }
          - label: "Liens"
            name: links
            widget: object
            fields:
              - { label: SoundCloud, name: soundcloud, widget: string, required: false }
              - { label: Mixcloud,   name: mixcloud,   widget: string, required: false }
              - { label: Spotify,    name: spotify,    widget: string, required: false }
              - { label: Instagram,  name: instagram,  widget: string, required: false }
              - { label: Facebook,   name: facebook,   widget: string, required: false }
              - { label: YouTube,    name: youtube,    widget: string, required: false }
      - name: son
        label: "Facette Son"
        file: src/data/son.json
        format: json
        fields:
          - { label: "Label (nom court)", name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",  name: teaser,   widget: string, required: false }
          - { label: "Titre / accroche",  name: headline, widget: string, required: false }
          - { label: "Genres",            name: genres,   widget: list,   required: false, hint: "Ex: psytrance, hi-tech, goa" }
          - { label: "Note stub",         name: note_stub, widget: string, required: false, hint: "Affiché sur la page stub tant que la facette est en chantier" }
          - { label: "Bio musicale",      name: bio,      widget: text,   required: false }
          - label: "Liens"
            name: links
            widget: object
            fields:
              - { label: SoundCloud, name: soundcloud, widget: string, required: false }
              - { label: Mixcloud,   name: mixcloud,   widget: string, required: false }
              - { label: Spotify,    name: spotify,    widget: string, required: false }
              - { label: Presskit,   name: presskit,   widget: string, required: false }
      - name: regie
        label: "Facette Régie"
        file: src/data/regie.json
        format: json
        fields:
          - { label: "Label (nom court)", name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",  name: teaser,   widget: string, required: false }
          - { label: "Accroche",          name: headline, widget: string, required: false }
          - { label: "Note stub",         name: note_stub, widget: string, required: false }
          - { label: "Texte",             name: bio,      widget: text,   required: false }
          - label: "Liens"
            name: links
            widget: object
            fields:
              - { label: "Lien 1", name: lien1, widget: string, required: false }
      - name: cours
        label: "Facette Cours"
        file: src/data/cours.json
        format: json
        fields:
          - { label: "Label (nom court)", name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",  name: teaser,   widget: string, required: false }
          - { label: "Accroche",          name: headline, widget: string, required: false }
          - { label: "Note stub",         name: note_stub, widget: string, required: false }
          - { label: "Texte",             name: bio,      widget: text,   required: false }
          - label: "Liens"
            name: links
            widget: object
            fields:
              - { label: "Lien inscription", name: inscription, widget: string, required: false }
      - name: outils
        label: "Facette Outils"
        file: src/data/outils.json
        format: json
        fields:
          - { label: "Label (nom court)", name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",  name: teaser,   widget: string, required: false }
          - { label: "Accroche",          name: headline, widget: string, required: false }
          - { label: "Note stub",         name: note_stub, widget: string, required: false }
          - { label: "Texte",             name: bio,      widget: text,   required: false }
      - name: contact
        label: "Facette Contact"
        file: src/data/contact.json
        format: json
        fields:
          - { label: "Label (nom court)", name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",  name: teaser,   widget: string, required: false }
          - { label: "Accroche",          name: headline, widget: string, required: false }
          - { label: "Note stub",         name: note_stub, widget: string, required: false }
          - { label: "Email",             name: email,    widget: string, required: false }
          - { label: "Texte",             name: bio,      widget: text,   required: false }
      - name: blog
        label: "Facette Blog"
        file: src/data/blog.json
        format: json
        fields:
          - { label: "Label (nom court)",       name: label,    widget: string, required: false }
          - { label: "Teaser (1 ligne)",         name: teaser,   widget: string, required: false }
          - { label: "Titre de page",            name: headline, widget: string, required: false }
          - { label: "Message avant ouverture",  name: note_stub, widget: text,  required: false }
          - { label: "Description du blog",      name: bio,      widget: text,   required: false }
